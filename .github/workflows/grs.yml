name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=r2d2vader&layout=compact&theme=highcontrast&hide=ezhil,csv,sql,xml,toml,json,markdown,other,prolog,text,yaml,git%20config,gitignore%20file,ini,image%20(svg),public%20key,binary,docker,vue.js,asl,gradle,actionscript,nginx%20configuration%20file,tex,rpmspec,objective-c,makefile&range=all_time&custom_title=Time%20spent%20coding%20%28since%20March%202022%29
          path: profile/stats.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
